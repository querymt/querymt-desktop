name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            target: aarch64-apple-darwin
            qmtcode_asset_glob: qmtcode-*-aarch64-apple-darwin.tar.gz
            tauri_args: --target aarch64-apple-darwin --bundles dmg
          - name: macOS Intel
            platform: macos-latest
            target: x86_64-apple-darwin
            qmtcode_asset_glob: qmtcode-*-x86_64-apple-darwin.tar.gz
            tauri_args: --target x86_64-apple-darwin --bundles dmg
          - name: Windows x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            qmtcode_asset_glob: qmtcode-*-x86_64-pc-windows-msvc.zip
            tauri_args: --target x86_64-pc-windows-msvc --bundles nsis
          - name: Linux x64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            qmtcode_asset_glob: qmtcode-*-x86_64-unknown-linux-musl.tar.gz
            tauri_args: --target x86_64-unknown-linux-gnu --bundles appimage,deb
          - name: Linux arm64
            platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            qmtcode_asset_glob: qmtcode-*-aarch64-unknown-linux-musl.tar.gz
            tauri_args: --target aarch64-unknown-linux-gnu --bundles appimage,deb

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Download latest qmtcode sidecar
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          QMTCODE_ASSET_GLOB: ${{ matrix.qmtcode_asset_glob }}
          TAURI_TARGET: ${{ matrix.target }}
        run: |
          $ErrorActionPreference = 'Stop'
          $headers = @{
            Accept = 'application/vnd.github+json'
            Authorization = "Bearer $env:GH_TOKEN"
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          $release = Invoke-RestMethod -Headers $headers -Uri 'https://api.github.com/repos/querymt/querymt/releases/latest'
          $asset = $release.assets | Where-Object { $_.name -like $env:QMTCODE_ASSET_GLOB } | Select-Object -First 1
          if (-not $asset) {
            throw "No qmtcode asset matching '$env:QMTCODE_ASSET_GLOB' found in $($release.tag_name)."
          }

          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          New-Item -ItemType Directory -Force -Path qmtcode-extract | Out-Null
          $archive = Join-Path $PWD $asset.name
          Invoke-WebRequest -Headers $headers -Uri $asset.browser_download_url -OutFile $archive

          if ($asset.name.EndsWith('.zip')) {
            Expand-Archive -Path $archive -DestinationPath qmtcode-extract -Force
          } else {
            tar -xzf $archive -C qmtcode-extract
          }

          $binary = Get-ChildItem -Path qmtcode-extract -Recurse -File |
            Where-Object { $_.Name -eq 'qmtcode' -or $_.Name -eq 'qmtcode.exe' } |
            Select-Object -First 1
          if (-not $binary) {
            throw "Downloaded qmtcode archive did not contain a qmtcode executable."
          }

          $extension = if ($env:RUNNER_OS -eq 'Windows') { '.exe' } else { '' }
          $destination = Join-Path 'src-tauri/binaries' "qmtcode-$env:TAURI_TARGET$extension"
          Copy-Item -Path $binary.FullName -Destination $destination -Force
          if ($env:RUNNER_OS -ne 'Windows') {
            chmod +x $destination
          }

          $tauriConfigPath = 'src-tauri/tauri.conf.json'
          $tauriConfig = Get-Content $tauriConfigPath -Raw | ConvertFrom-Json
          $tauriConfig.bundle | Add-Member -NotePropertyName externalBin -NotePropertyValue @('binaries/qmtcode') -Force
          $tauriConfig | ConvertTo-Json -Depth 20 | Set-Content $tauriConfigPath

          "QMTCODE_VERSION=$($release.tag_name)" >> $env:GITHUB_ENV
          "QMTCODE_ASSET=$($asset.name)" >> $env:GITHUB_ENV

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: QueryMT Desktop ${{ github.ref_name }}
          releaseBody: |
            Desktop release for QueryMT Desktop.

            Bundled qmtcode: ${{ env.QMTCODE_VERSION }} (${{ env.QMTCODE_ASSET }})
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri_args }}
